<!DOCTYPE html>
<html lang="es">
<head><title>Tabla Accesible</title></head>
<body>
    <table border="1">
        <h1>Horario de clases</h1>
        <thead>
            <tr>
                <th scope="col">Día</th>
                <th scope="col">Asignatura</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">Lunes</th>
                <td>Matemáticas</td>
            </tr>
            <tr>
                <th scope="row">Martes</th>
                <td>Historia</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
